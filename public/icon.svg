  <!-- AI eye - Netdata green -->
  <circle cx="320" cy="256" r="56" fill="url(#accent)"/>
  <circle cx="320" cy="256" r="24" fill="#fff"/>

  <!-- Dots -->
  <circle cx="320" cy="80" r="16" fill="#818CF8" opacity="0.7"/>
  <circle cx="320" cy="432" r="16" fill="#818CF8" opacity="0.7"/>
