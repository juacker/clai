<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C49A"/>
      <stop offset="100%" style="stop-color:#00AB94"/>
    </linearGradient>
  </defs>

  <!-- Single smooth C using arc - most rounded -->
  <path d="M380 95
           C200 70 70 140 70 256
           C70 372 200 442 380 417"
        fill="none" stroke="url(#indigo)" stroke-width="52" stroke-linecap="round"/>

  <!-- Simple green circle -->
  <circle cx="256" cy="256" r="70" fill="url(#green)"/>

  <!-- Small white reflection -->
  <circle cx="235" cy="235" r="12" fill="#fff" opacity="0.9"/>
</svg>
