name: Flatpak

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const release = releases.data[0];
            const debAsset = release.assets.find(a => a.name.endsWith('.deb'));
            return {
              id: release.id,
              tag: release.tag_name,
              deb_url: debAsset ? debAsset.browser_download_url : null
            };

      - name: Download deb package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=$(echo '${{ steps.release.outputs.result }}' | jq -r '.tag')
          gh release download "$RELEASE_TAG" --pattern "*.deb" --output clai.deb

      - name: Extract binary from deb
        run: |
          ar x clai.deb
          tar xf data.tar.*
          ls -la usr/bin/

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//48

      - name: Create Flatpak
        run: |
          mkdir -p flatpak-build/files/bin
          mkdir -p flatpak-build/files/share/applications
          mkdir -p flatpak-build/files/share/icons/hicolor/128x128/apps

          cp usr/bin/clai flatpak-build/files/bin/
          cp flatpak/com.juacker.clai.desktop flatpak-build/files/share/applications/
          cp src-tauri/icons/128x128.png flatpak-build/files/share/icons/hicolor/128x128/apps/com.juacker.clai.png

          cat > flatpak-build/metadata << 'EOF'
          [Application]
          name=com.juacker.clai
          runtime=org.gnome.Platform/x86_64/48
          command=clai

          [Context]
          shared=ipc;network;
          sockets=fallback-x11;wayland;
          devices=dri;
          filesystems=home;
          EOF

          flatpak build-export repo flatpak-build
          flatpak build-bundle repo clai.flatpak com.juacker.clai

      - name: Upload to Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseId = JSON.parse('${{ steps.release.outputs.result }}').id;
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'clai.flatpak',
              data: fs.readFileSync('clai.flatpak')
            });
