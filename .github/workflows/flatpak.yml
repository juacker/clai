name: Flatpak

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    name: Build Flatpak
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            const release = releases.data[0];
            const debAsset = release.assets.find(a => a.name.endsWith('.deb'));
            return {
              id: release.id,
              tag: release.tag_name,
              deb_url: debAsset ? debAsset.browser_download_url : null
            };

      - name: Download deb package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=$(echo '${{ steps.release.outputs.result }}' | jq -r '.tag')
          gh release download "$RELEASE_TAG" --pattern "*.deb" --output clai.deb

      - name: Extract binary from deb
        run: |
          ar x clai.deb
          tar xf data.tar.*
          ls -la usr/bin/

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Create Flatpak
        run: |
          # Initialize flatpak build directory
          flatpak build-init flatpak-build com.juacker.clai org.gnome.Sdk//48 org.gnome.Platform//48

          # Copy files into the build
          mkdir -p flatpak-build/files/bin
          mkdir -p flatpak-build/files/share/applications
          mkdir -p flatpak-build/files/share/icons/hicolor/128x128/apps
          mkdir -p flatpak-build/files/share/icons/hicolor/scalable/apps
          mkdir -p flatpak-build/files/share/metainfo

          cp usr/bin/clai flatpak-build/files/bin/
          cp flatpak/com.juacker.clai.desktop flatpak-build/files/share/applications/
          cp src-tauri/icons/128x128.png flatpak-build/files/share/icons/hicolor/128x128/apps/com.juacker.clai.png
          cp public/icon.svg flatpak-build/files/share/icons/hicolor/scalable/apps/com.juacker.clai.svg
          cp flatpak/com.juacker.clai.metainfo.xml flatpak-build/files/share/metainfo/

          # Finalize the build
          flatpak build-finish flatpak-build \
            --command=clai \
            --share=ipc \
            --share=network \
            --socket=fallback-x11 \
            --socket=wayland \
            --socket=session-bus \
            --device=dri \
            --filesystem=home \
            --talk-name=org.freedesktop.Flatpak \
            --talk-name=org.freedesktop.secrets

          # Export and bundle
          flatpak build-export repo flatpak-build
          flatpak build-bundle repo clai.flatpak com.juacker.clai

      - name: Upload to Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseId = JSON.parse('${{ steps.release.outputs.result }}').id;

            // Check if asset already exists and delete it
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });
            const existingAsset = assets.data.find(a => a.name === 'clai.flatpak');
            if (existingAsset) {
              console.log('Deleting existing clai.flatpak asset...');
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existingAsset.id
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'clai.flatpak',
              data: fs.readFileSync('clai.flatpak')
            });
