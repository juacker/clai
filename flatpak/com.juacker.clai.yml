app-id: com.juacker.clai
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: clai

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/clai/cargo
    npm_config_nodedir: /usr/lib/sdk/node20

modules:
  - name: clai
    buildsystem: simple
    build-commands:
      - npm install --legacy-peer-deps --ignore-engines
      - npm run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/clai ${FLATPAK_DEST}/bin/clai
      - install -Dm644 src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.juacker.clai.png
      - install -Dm644 flatpak/com.juacker.clai.desktop ${FLATPAK_DEST}/share/applications/com.juacker.clai.desktop
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - node_modules
          - target
          - dist
